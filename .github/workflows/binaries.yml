name: Binaries

on:
  workflow_dispatch:
  push:
    paths: ['stand-in-mcp-explorer/**', 'stand-in-client/**', 'stand-in-client-macros/**', 'stand-in/**', 'stand-in-macros/**', '.github/workflows/binaries.yml']
    branches: ['main']
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-explorer:
    name: Build MCP Explorer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: stand-in-mcp-explorer
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: stand-in-mcp-explorer
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: stand-in-mcp-explorer.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies (gpui/Vulkan)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libxkbcommon-dev libwayland-dev

      - name: Build release
        run: cargo build --manifest-path stand-in-mcp-explorer/Cargo.toml --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}-${{ matrix.target }}
          path: stand-in-mcp-explorer/target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error
